<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت نام</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="signup-container">
      <h3>ثبت نام</h3>

      <div class="signup">
        <form action="#" method="post">
          <input type="text" name="fname" placeholder="نام" />
          <input type="text" name="lname" placeholder="نام خانوادگی" />
          <input type="number" name="phone" placeholder="تلفن همراه" />
          <input type="text" name="username" placeholder="نام کاربری" />
          <input type="password" name="password" placeholder="رمز عبور" />
          <button type="submit" id="submit" name="submit">ثبت نام</button>
        </form>
        <h5>از قبل حساب کاربری دارید ؟ <a href="login.html" style="text-decoration: none;">ورود</a></h5>
        
      </div>
    </div>
  </body>
</html>
